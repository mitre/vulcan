name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/dependabot.yml'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/dependabot.yml'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─── LINT + SECURITY ─────────────────────────────────────
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1
        with:
          ruby-version: '.ruby-version'
          bundler-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: RuboCop
        run: bundle exec rubocop --parallel
      - name: ESLint
        run: yarn lint:ci
      - name: Brakeman
        run: bundle exec brakeman -q --no-pager
      - name: Bundle Audit
        run: bundle exec bundler-audit check --update

  # ─── FRONTEND TESTS + COVERAGE ───────────────────────────
  frontend:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Vitest with coverage
        run: yarn test:unit --coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-frontend
          path: coverage/js
          retention-days: 5

  # ─── BACKEND TESTS + COVERAGE (6 shards) ─────────────────
  backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        ci_node_index: [1, 2, 3, 4, 5, 6]

    services:
      db:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: vulcan_vue_test
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_INITDB_ARGS: "--nosync"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 500ms
          --health-timeout 3s
          --health-retries 20
      ldap:
        image: rroemhild/test-openldap
        ports:
          - 10389:10389

    env:
      # Application config (read by database.yml)
      DATABASE_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # libpq vars (read by pg_isready, psql CLI tools)
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      RAILS_ENV: test
      RUBY_YJIT_ENABLE: "1"
      CI: "true"
      # OIDC Testing — VULCAN_OIDC_* is the primary source;
      # spec/support/okta_test_config.rb falls back to these
      VULCAN_ENABLE_OIDC: "true"
      VULCAN_OIDC_DISCOVERY: "true"
      VULCAN_OIDC_ISSUER_URL: ${{ secrets.OKTA_TEST_ISSUER }}
      VULCAN_OIDC_CLIENT_ID: ${{ secrets.OKTA_TEST_CLIENT_ID }}
      VULCAN_OIDC_CLIENT_SECRET: ${{ secrets.OKTA_TEST_CLIENT_SECRET }}
      # LDAP Testing (rroemhild/test-openldap public defaults)
      VULCAN_ENABLE_LDAP: "true"
      VULCAN_LDAP_HOST: localhost
      VULCAN_LDAP_ATTRIBUTE: mail
      VULCAN_LDAP_BIND_DN: "cn=admin,dc=planetexpress,dc=com"
      VULCAN_LDAP_BASE: "ou=people,dc=planetexpress,dc=com"
      VULCAN_LDAP_PORT: "10389"
      VULCAN_LDAP_ADMIN_PASS: GoodNewsEveryone

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1
        with:
          ruby-version: '.ruby-version'
          bundler-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Install system dependencies
        run: sudo apt-get -yqq install libpq-dev

      - name: Cache JS build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: js-cache
        with:
          path: app/assets/builds
          key: js-build-${{ hashFiles('app/javascript/**', 'yarn.lock', 'esbuild.config.js', 'package.json') }}
      - name: Build JavaScript assets
        if: steps.js-cache.outputs.cache-hit != 'true'
        run: yarn build

      - name: Setup database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load

      - name: Run backend tests (shard ${{ matrix.ci_node_index }}/6)
        run: |
          bundle exec parallel_rspec \
            -n 6 \
            --only-group ${{ matrix.ci_node_index }} \
            spec/

      - name: Upload backend coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-shard-${{ matrix.ci_node_index }}
          path: coverage
          retention-days: 5

  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      IMAGE_NAME: mitre/vulcan:ci-${{ github.sha }}
      COMPOSE_PROJECT_NAME: vulcan-ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3

      - name: Build production image with Bake
        run: >-
          docker buildx bake
          --file docker-bake.hcl
          --set *.cache-from=type=gha
          --set *.cache-to=type=gha,mode=max
          --set *.output=type=docker
          --set *.platform=linux/amd64
          --set *.tags=${IMAGE_NAME}
          ci

      - name: Save Docker image tarball
        run: docker save --output vulcan-image.tar "$IMAGE_NAME"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vulcan-docker-image
          path: vulcan-image.tar
          retention-days: 5

      - name: Create CI environment files
        run: |
          cat <<'EOF' > .env
          VULCAN_DB_HOST=db
          VULCAN_DB_PORT=5432
          VULCAN_DB_NAME=vulcan_production
          VULCAN_DB_USER=postgres
          VULCAN_DB_PASSWORD=postgres
          POSTGRES_DB=vulcan_production
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          SECRET_KEY_BASE=ci-secret-key-base-for-compose-healthcheck
          VULCAN_ENABLE_OIDC=false
          VULCAN_ENABLE_LDAP=false
          EOF
          cp .env .env.ci

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --no-build

      - name: Wait for Vulcan to become healthy
        run: |
          container_id="$(docker compose ps -q web)"
          if [ -z "$container_id" ]; then
            echo "::error::Web container was not created"
            docker compose ps
            exit 1
          fi

          for attempt in $(seq 1 60); do
            status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container_id")"
            if [ "$status" = "healthy" ]; then
              echo "Vulcan is healthy"
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "::error::Vulcan became unhealthy"
              docker compose logs --no-color
              exit 1
            fi
            sleep 5
          done

          echo "::error::Timed out waiting for Vulcan to become healthy"
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v

  # ─── GATE — single required status check for branch protection ───
  ci-gate:
    needs: [lint, frontend, backend, docker]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"(failure|cancelled|skipped)"'; then
            echo "::error::One or more CI jobs failed, were cancelled, or were skipped"
            exit 1
          fi
          echo "All CI jobs passed"
