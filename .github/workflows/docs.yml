name: Deploy VitePress Documentation

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required: VitePress lastUpdated uses git log timestamps

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Docs use Node 24 (same as app). The docs/ subdirectory has its own
          # package.json with VitePress/Vue 3 — isolated from the main app's Vue 2.
          node-version-file: '.nvmrc'
          cache: yarn
          cache-dependency-path: docs/yarn.lock

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install and build docs
        env:
          GITHUB_DEPLOY: "true"  # Tell VitePress to use / base for custom domain
        run: |
          # DO NOT install main dependencies - they cause Vue 2/3 conflict
          cd docs
          yarn install
          yarn build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
