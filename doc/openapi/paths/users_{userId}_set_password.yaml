parameters:
  - name: userId
    in: path
    required: true
    schema:
      type: integer
post:
  operationId: setPassword
  tags:
    - Users
  summary: Directly set a user's password (admin only)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            user:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
  responses:
    '200':
      description: Password updated
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ToastResponse.yaml
    '422':
      description: Blank password or validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ToastResponse.yaml
    '500':
      description: Internal error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ToastResponse.yaml
    4XX:
      $ref: ../components/responses/ErrorResponse.yaml
