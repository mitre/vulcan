name: triage_status
in: query
description: Filter comments by triage disposition. Use "all" to return comments in any status.
schema:
  type: string
  enum:
    - all
    - pending
    - concur
    - concur_with_comment
    - non_concur
    - needs_clarification
    - duplicate
    - addressed_by
    - withdrawn
  default: all
example: pending
