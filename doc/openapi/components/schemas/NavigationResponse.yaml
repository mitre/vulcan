description: >-
  App shell navigation data for SPA navbar. Includes static nav links,
  pending access request notifications, and locked user alerts.
type: object
required:
  - nav_links
  - access_requests
  - locked_users
properties:
  nav_links:
    type: array
    description: Primary navigation links for the sidebar/navbar.
    items:
      type: object
      properties:
        icon:
          type: string
          description: Bootstrap icon name.
          example: folder2-open
        name:
          type: string
          description: Display label.
          example: Projects
        link:
          type: string
          description: URL path. Absent on parent items with children.
          example: /projects
        children:
          type: array
          description: Nested sub-links (e.g., Resources → DISA Guide).
          items:
            type: object
            properties:
              icon:
                type: string
                example: book
              name:
                type: string
                example: DISA Process Guide
              link:
                type: string
                example: /disa_guide
  access_requests:
    type: array
    description: >-
      Pending project access requests visible to the current user.
      Empty for non-admin users.
    items:
      type: object
      properties:
        id:
          type: integer
          description: Access request ID.
          example: 1
        user:
          type: object
          description: Requesting user summary.
          properties:
            id:
              type: integer
              example: 42
            name:
              type: string
              example: Jane Doe
            email:
              type: string
              format: email
              example: jane@example.com
        project:
          type: object
          description: Target project summary.
          properties:
            id:
              type: integer
              example: 7
            name:
              type: string
              example: RHEL 9 STIG
  locked_users:
    type: array
    description: >-
      Locked user accounts (admin-only, lockout enabled).
      Empty for non-admin or when lockout disabled.
    items:
      type: object
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Locked User
        email:
          type: string
          format: email
          example: locked@example.com
