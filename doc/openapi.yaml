          description: No file, no SRG IDs found, no match, or ambiguous match
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No SRG IDs found in spreadsheet
        4XX:
          $ref: '#/components/responses/ErrorResponse'
