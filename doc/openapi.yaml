components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: _vulcan_session
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    ComponentId:
      name: componentId
      in: path
      required: true
      schema:
        type: integer
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: integer
    ReviewId:
      name: reviewId
      in: path
      required: true
      schema:
        type: integer
    SearchQuery:
      name: q
      in: query
      required: true
      description: Search query (minimum 2 characters)
      schema:
        type: string
        minLength: 2
    TriageStatusFilter:
      name: triage_status
      in: query
      schema:
        type: string
        enum:
        - all
        - pending
        - concur
        - concur_with_comment
        - non_concur
        - needs_clarification
        - duplicate
        - addressed_by
        - withdrawn
        default: all
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 25
  schemas:
    VersionResponse:
      type: object
      properties:
        version:
          type: string
          example: 2.3.7
        rails:
          type: string
          example: 8.0.2.1
        ruby:
          type: string
          example: 3.4.9
    ToastResponse:
      type: object
      properties:
        toast:
          type: object
          properties:
            title:
              type: string
            message:
              type: array
              items:
                type: string
            variant:
              type: string
              enum:
              - success
              - danger
              - warning
              - info
    ProjectInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum:
          - discoverable
          - hidden
    ComponentInput:
      type: object
      properties:
        name:
          type: string
        prefix:
          type: string
        version:
          type: string
        release:
          type: string
        title:
          type: string
        description:
          type: string
    RuleInput:
      type: object
      properties:
        status:
          type: string
          enum:
          - Not Yet Determined
          - Applicable - Configurable
          - Applicable - Inherently Meets
          - Applicable - Does Not Meet
          - Not Applicable
        title:
          type: string
        fixtext:
          type: string
        vendor_comments:
          type: string
        status_justification:
          type: string
        artifact_description:
          type: string
        locked:
          type: boolean
    ReviewInput:
      type: object
      properties:
        action:
          type: string
          enum:
          - comment
          - request_review
          - revoke_review_request
          - approve
          - lock
        comment:
          type: string
        section:
          type: string
        responding_to_review_id:
          type: integer
    MembershipInput:
      type: object
      properties:
        user_id:
          type: integer
        membership_id:
          type: integer
        membership_type:
          type: string
          enum:
          - Project
          - Component
        role:
          type: string
          enum:
          - viewer
          - author
          - reviewer
          - admin
    UserSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type:
          - string
          - 'null'
        email:
          type: string
        provider:
          type:
          - string
          - 'null'
        admin:
          type: boolean
        last_sign_in_at:
          type:
          - string
          - 'null'
        failed_attempts:
          type: integer
        locked_at:
          type:
          - string
          - 'null'
    GlobalSearchResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              description:
                type:
                - string
                - 'null'
              components_count:
                type: integer
        components:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              version:
                type:
                - integer
                - 'null'
              release:
                type:
                - integer
                - 'null'
              project_id:
                type: integer
              project_name:
                type: string
        rules:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              rule_id:
                type: string
              title:
                type: string
              status:
                type: string
              component_id:
                type: integer
              component_prefix:
                type: string
              snippet:
                type: string
              matched_field:
                type: string
              comment_count:
                type: integer
        srgs:
          type: array
          items:
            type: object
        stigs:
          type: array
          items:
            type: object
        stig_rules:
          type: array
          items:
            type: object
        srg_rules:
          type: array
          items:
            type: object
    PaginatedComments:
      type: object
      properties:
        rows:
          type: array
          items:
            "$ref": "#/components/schemas/CommentRow"
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_comments:
              type: integer
        status_counts:
          type: object
          additionalProperties:
            type: integer
    CommentRow:
      type: object
      properties:
        id:
          type: integer
        rule_id:
          type:
          - integer
          - 'null'
        rule_displayed_name:
          type: string
        commentable_type:
          type: string
          enum:
          - BaseRule
          - Component
        section:
          type:
          - string
          - 'null'
        author_name:
          type: string
        author_email:
          type: string
        comment:
          type: string
        created_at:
          type: string
          format: date-time
        triage_status:
          type: string
        triage_set_at:
          type:
          - string
          - 'null'
          format: date-time
        adjudicated_at:
          type:
          - string
          - 'null'
          format: date-time
        responses_count:
          type: integer
        reactions:
          type: object
          properties:
            up:
              type: integer
            down:
              type: integer
    StatusOk:
      type: object
      properties:
        status:
          type: string
          example: ok
    ProjectSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type:
          - string
          - 'null'
        visibility:
          type:
          - string
          - 'null'
        components_count:
          type: integer
        created_at:
          type:
          - string
          - 'null'
        updated_at:
          type:
          - string
          - 'null'
    ComponentSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        prefix:
          type: string
        version:
          type:
          - integer
          - 'null'
        release:
          type:
          - integer
          - 'null'
        title:
          type:
          - string
          - 'null'
        released:
          type: boolean
        project_id:
          type: integer
        rules_count:
          type: integer
        description:
          type:
          - string
          - 'null'
    RuleSummary:
      type: object
      properties:
        id:
          type: integer
        rule_id:
          type: string
        status:
          type:
          - string
          - 'null'
        title:
          type:
          - string
          - 'null'
        locked:
          type: boolean
        component_id:
          type: integer
    BenchmarkSummary:
      type: object
      properties:
        id:
          type: integer
        srg_id:
          type:
          - string
          - 'null'
        stig_id:
          type:
          - string
          - 'null'
        name:
          type:
          - string
          - 'null'
        title:
          type:
          - string
          - 'null'
        version:
          type:
          - string
          - 'null'
        release_date:
          type:
          - string
          - 'null'
        severity_counts:
          type: object
    AuditEntry:
      type: object
      properties:
        id:
          type: integer
        auditable_type:
          type: string
        auditable_id:
