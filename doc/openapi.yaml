---
openapi: 3.2.0
info:
  title: Vulcan API
  version: 2.3.7
  description: |
    REST API for Vulcan — STIG-ready security guidance authoring platform.
    All endpoints require session-based authentication via cookie unless noted otherwise.
    Mutation endpoints return a canonical `{toast: {title, message, variant}}` object.
  contact:
    name: MITRE SAF Team
    url: https://github.com/mitre/vulcan
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: "/"
  description: Same-origin (session cookie auth)
security:
- cookieAuth: []
tags:
- name: Projects
  description: Project CRUD, export, import, and member management
- name: Components
  description: Component CRUD, spreadsheet import, export, and locking
- name: Rules
  description: Rule CRUD, revert, section locks, and satisfaction relationships
- name: Reviews
  description: Review lifecycle — create, triage, adjudicate, withdraw, admin actions
- name: Reactions
  description: Thumbs up/down reactions on comment reviews
- name: Memberships
  description: Project and component membership management
- name: Search
  description: Global search across projects, components, rules, SRGs, and STIGs
- name: Users
  description: User management and admin operations
- name: Benchmarks
  description: SRG and STIG upload, listing, export, and deletion
- name: System
  description: Version and health check endpoints
paths:
  "/api/version":
    get:
      operationId: getVersion
      tags:
      - System
      summary: Application version
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/VersionResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/api/search/global":
    get:
      operationId: globalSearch
      tags:
      - Search
      summary: Search across all resource types
      parameters:
      - "$ref": "#/components/parameters/SearchQuery"
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
      - name: component_id
        in: query
        description: Scope rule search to a specific component
        schema:
          type: integer
      responses:
        '200':
          description: Search results grouped by type
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GlobalSearchResponse"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/api/users/search":
    get:
      operationId: searchUsers
      tags:
      - Search
      summary: Search users by name or email
      parameters:
      - "$ref": "#/components/parameters/SearchQuery"
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      "$ref": "#/components/schemas/UserSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects":
    get:
      operationId: listProjects
      tags:
      - Projects
      summary: List accessible projects
      responses:
        '200':
          description: Projects list (HTML or JSON)
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/ProjectSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    post:
      operationId: createProject
      tags:
      - Projects
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  "$ref": "#/components/schemas/ProjectInput"
      responses:
        '200':
          description: Project created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/{projectId}":
    parameters:
    - "$ref": "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      tags:
      - Projects
      summary: Project detail with component list and stats
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProjectSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    put:
      operationId: updateProject
      tags:
      - Projects
      summary: Update project attributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project:
                  "$ref": "#/components/schemas/ProjectInput"
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    delete:
      operationId: deleteProject
      tags:
      - Projects
      summary: Delete a project and all its components
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        '403':
          "$ref": "#/components/responses/Forbidden"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/{projectId}/comments":
    parameters:
    - "$ref": "#/components/parameters/ProjectId"
    get:
      operationId: getProjectComments
      tags:
      - Projects
      summary: Aggregated comments across all project components
      parameters:
      - "$ref": "#/components/parameters/TriageStatusFilter"
      - "$ref": "#/components/parameters/PageParam"
      - "$ref": "#/components/parameters/PerPageParam"
      responses:
        '200':
          description: Paginated comment rows with status counts
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PaginatedComments"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/{projectId}/export/{type}":
    parameters:
    - "$ref": "#/components/parameters/ProjectId"
    - name: type
      in: path
      required: true
      schema:
        type: string
        enum:
        - csv
        - xccdf
        - inspec
        - json_archive
    get:
      operationId: exportProject
      tags:
      - Projects
      summary: Export project data in the specified format
      parameters:
      - name: component_ids
        in: query
        required: true
        schema:
          type: string
        description: Comma-separated component IDs
      - name: mode
        in: query
        schema:
          type: string
          enum:
          - working_copy
          - vendor_submission
          - published_stig
      - name: include_srg
        in: query
        schema:
          type: string
          enum:
          - 'true'
      - name: include_memberships
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      - name: exclude_satisfied_by
        in: query
        schema:
          type: string
          enum:
          - 'true'
      responses:
        '200':
          description: File download
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/create_from_backup":
    post:
      operationId: createFromBackup
      tags:
      - Projects
      summary: Create a project from a JSON archive backup
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
      responses:
        '200':
          description: Project created from backup
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/{projectId}/import_backup":
    parameters:
    - "$ref": "#/components/parameters/ProjectId"
    post:
      operationId: importBackup
      tags:
      - Projects
      summary: Import components from a JSON archive into an existing project
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Backup imported
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/{projectId}/histories":
    parameters:
    - "$ref": "#/components/parameters/ProjectId"
    get:
      operationId: getProjectHistories
      tags:
      - Projects
      summary: Audit history for the project
      responses:
        '200':
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/AuditEntry"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components":
    get:
      operationId: listComponents
      tags:
      - Components
      summary: List released components
      responses:
        '200':
          description: Components list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/ComponentSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/projects/{projectId}/components":
    parameters:
    - "$ref": "#/components/parameters/ProjectId"
    post:
      operationId: createComponent
      tags:
      - Components
      summary: Create or duplicate a component in a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  "$ref": "#/components/schemas/ComponentInput"
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Component created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    get:
      operationId: getComponent
      tags:
      - Components
      summary: Component detail with rules (editor or viewer mode based on membership)
      responses:
        '200':
          description: Component with rules via ComponentBlueprint
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ComponentSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    put:
      operationId: updateComponent
      tags:
      - Components
      summary: Update component attributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  "$ref": "#/components/schemas/ComponentInput"
      responses:
        '200':
          description: Component updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    patch:
      operationId: patchComponent
      tags:
      - Components
      summary: Partial update of component attributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  "$ref": "#/components/schemas/ComponentInput"
      responses:
        '200':
          description: Component updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    delete:
      operationId: deleteComponent
      tags:
      - Components
      summary: Delete a component and all dependent records
      responses:
        '200':
          description: Component deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/comments":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    get:
      operationId: getComponentComments
      tags:
      - Components
      summary: Paginated triage table for component comments
      parameters:
      - "$ref": "#/components/parameters/TriageStatusFilter"
      - "$ref": "#/components/parameters/PageParam"
      - "$ref": "#/components/parameters/PerPageParam"
      - name: section
        in: query
        schema:
          type: string
      - name: rule_id
        in: query
        schema:
          type: integer
      - name: author_id
        in: query
        schema:
          type: integer
      - name: query
        in: query
        schema:
          type: string
      - name: resolved
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
          - all
      - name: commentable_type
        in: query
        schema:
          type: string
          enum:
          - rule
          - component
      responses:
        '200':
          description: Paginated comment rows
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PaginatedComments"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/export/{type}":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    - name: type
      in: path
      required: true
      schema:
        type: string
        enum:
        - csv
        - xccdf
        - inspec
        - json_archive
        - disposition_csv
    get:
      operationId: exportComponent
      tags:
      - Components
      summary: Export component in the specified format
      responses:
        '200':
          description: File download
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/lock":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    post:
      operationId: lockComponent
      tags:
      - Components
      summary: Lock all unlocked rules in a component
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                review:
                  type: object
                  properties:
                    comment:
                      type: string
      responses:
        '200':
          description: Controls locked
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/lock_sections":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    patch:
      operationId: lockSections
      tags:
      - Components
      summary: Lock specific sections on every unlocked rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                locked_fields:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Sections locked
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/histories":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    get:
      operationId: getComponentHistories
      tags:
      - Components
      summary: Audit history for the component
      responses:
        '200':
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/AuditEntry"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/rules":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    get:
      operationId: listComponentRules
      tags:
      - Rules
      summary: List rules for a component
      responses:
        '200':
          description: Rules list
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/RuleSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    post:
      operationId: createRule
      tags:
      - Rules
      summary: Create a new rule in a component
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule:
                  "$ref": "#/components/schemas/RuleInput"
      responses:
        '200':
          description: Rule created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/rules_picker":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    get:
      operationId: getRulesPicker
      tags:
      - Rules
      summary: Lightweight rule list for picker UI
      responses:
        '200':
          description: Rules in picker format
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      "$ref": "#/components/schemas/RuleSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/detect_srg":
    post:
      operationId: detectSrg
      tags:
      - Components
      summary: Detect which SRG a spreadsheet belongs to
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Matched SRG info
          content:
            application/json:
              schema:
                type: object
                properties:
                  srg_id:
                    type: integer
                  srg_title:
                    type: string
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/history":
    get:
      operationId: getComponentHistory
      tags:
      - Components
      summary: Revision history for a named component across versions
      parameters:
      - name: project_id
        in: query
        required: true
        schema:
          type: integer
        description: Project containing the component versions
      - name: name
        in: query
        required: true
        schema:
          type: string
        description: Component name to trace across versions
      responses:
        '200':
          description: Ordered revision history with per-version diffs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    component:
                      "$ref": "#/components/schemas/ComponentSummary"
                    base_component:
                      "$ref": "#/components/schemas/ComponentSummary"
                    diff_component:
                      "$ref": "#/components/schemas/ComponentSummary"
                    changes:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          change:
                            type: string
                            enum: [added, removed, updated]
                          base:
                            type: object
                          diff:
                            type: object
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/components/{componentId}/related":
    parameters:
    - "$ref": "#/components/parameters/ComponentId"
    get:
      operationId: searchRelatedComponents
      tags:
      - Components
      summary: Find components sharing the same SRG
      responses:
        '200':
          description: Related components
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/ComponentSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/api/components/compare":
    get:
      operationId: compareComponents
      tags:
      - Components
      summary: Side-by-side rule comparison between two peer components
      parameters:
      - name: base_id
        in: query
        required: true
        schema:
          type: integer
        description: ID of the base (older) component
      - name: diff_id
        in: query
        required: true
        schema:
          type: integer
        description: ID of the diff (newer) component
      responses:
        '200':
          description: Rule-by-rule diff with metadata envelope
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        base:
                          type:
                          - string
                          - 'null'
                        diff:
                          type:
                          - string
                          - 'null'
                        changed:
                          type: boolean
                  meta:
                    type: object
                    properties:
                      base_id:
                        type: integer
                      diff_id:
                        type: integer
                      rules_count:
                        type: integer
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rules/{ruleId}":
    parameters:
    - "$ref": "#/components/parameters/RuleId"
    get:
      operationId: getRule
      tags:
      - Rules
      summary: Rule detail
      responses:
        '200':
          description: Rule data
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/RuleSummary"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    put:
      operationId: updateRule
      tags:
      - Rules
      summary: Update rule attributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule:
                  "$ref": "#/components/schemas/RuleInput"
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
    delete:
      operationId: deleteRule
      tags:
      - Rules
      summary: Soft-delete a rule
      responses:
        '200':
          description: Rule deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rules/{ruleId}/revert":
    parameters:
    - "$ref": "#/components/parameters/RuleId"
    post:
      operationId: revertRule
      tags:
      - Rules
      summary: Revert a rule to a previous audit version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                audit_id:
                  type: integer
      responses:
        '200':
          description: Rule reverted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rules/{ruleId}/section_locks":
    parameters:
    - "$ref": "#/components/parameters/RuleId"
    patch:
      operationId: updateSectionLocks
      tags:
      - Rules
      summary: Update locked sections on a single rule
      responses:
        '200':
          description: Section locks updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rules/{ruleId}/bulk_section_locks":
    parameters:
    - "$ref": "#/components/parameters/RuleId"
    patch:
      operationId: bulkSectionLocks
      tags:
      - Rules
      summary: Bulk update locked sections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule:
                  type: object
                  properties:
                    locked_fields:
                      type: array
                      items:
                        type: string
      responses:
        '200':
          description: Section locks updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rule_satisfactions":
    post:
      operationId: addSatisfaction
      tags:
      - Rules
      summary: Create a satisfaction relationship between two rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rule_id:
                  type: integer
                satisfied_by_rule_id:
                  type: integer
      responses:
        '200':
          description: Satisfaction created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rule_satisfactions/{ruleId}":
    parameters:
    - "$ref": "#/components/parameters/RuleId"
    delete:
      operationId: removeSatisfaction
      tags:
      - Rules
      summary: Remove a satisfaction relationship
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rule_id:
                  type: integer
                satisfied_by_rule_id:
                  type: integer
      responses:
        '200':
          description: Satisfaction removed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ToastResponse"
        4XX:
          "$ref": "#/components/responses/ErrorResponse"
  "/rules/{ruleId}/reviews":
    parameters:
    - "$ref": "#/components/parameters/RuleId"
    post:
      operationId: createRuleReview
      tags:
      - Reviews
      summary: Create a review on a rule (comment, request_review, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
